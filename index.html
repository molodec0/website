<head>
    <meta charset="UTF-8">

    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
</head>

<body>

    <header>
        <h1>Здоровое питание</h1>
        <nav>
            <a href="index.html">Главная</a>
            <a href="principles.html">Принципы</a>

            <a href="lunchbox.html">Ланчбоксы</a>

        </nav>
    </header>



    <div class="hero">
        <h2>Начни заботиться о своем здоровье уже сегодня</h2>
    </div>

    <section>
        <div class="card">
            <h2>О проекте</h2>
            <p>Этот сайт посвящён принципам здорового питания и формированию правильных привычек.</p>
            <div class="card">
                <h2>Калькулятор калорий</h2>

                <label>Возраст:</label>
                <input type="number" id="age">

                <label>Рост (см):</label>
                <input type="number" id="height">

                <label>Вес (кг):</label>
                <input type="number" id="weight">

                <label>Пол:</label>
                <select id="gender">
                    <option value="male">Мужской</option>
                    <option value="female">Женский</option>
                </select>

                <label>Активность:</label>
                <select id="activity">
                    <option value="1.2">Минимальная</option>
                    <option value="1.375">Легкая</option>
                    <option value="1.55">Средняя</option>
                    <option value="1.725">Высокая</option>
                </select>

                <button onclick="calculateCalories()">Рассчитать</button>

                <script>
                    function calculateCalories() {
                        let age = document.getElementById('age').value;
                        let height = document.getElementById('height').value;
                        let weight = document.getElementById('weight').value;
                        let gender = document.getElementById('gender').value;
                        let activity = document.getElementById('activity').value;

                        let bmr;

                        if (gender === "male") {
                            bmr = 10 * weight + 6.25 * height - 5 * age + 5;
                        } else {
                            bmr = 10 * weight + 6.25 * height - 5 * age - 161;
                        }

                        let calories = bmr * activity;

                        document.getElementById('result').innerText =
                            "Ваша норма калорий: " + Math.round(calories) + " ккал/день";
                    }
                </script>

                <p id="result"></p>
            </div>
        </div>
    </section>

    <footer>
        <p>Источники: Голова Табла=)</p>
    </footer>

</body>

</html>
